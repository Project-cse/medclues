name: medichain_mobile
description: MediChain+ patient mobile app (Flutter port of PMS FNL 2 React Native).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  go_router: ^13.2.0

  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.2
  rive: ^0.13.20
  animations: ^2.0.11
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  intl: ^0.20.2
  url_launcher: ^6.2.5
  share_plus: ^10.1.4
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  pdf: ^3.10.8
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  connectivity_plus: ^6.0.2
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.0
  google_sign_in: ^6.2.1
  agora_rtc_engine: ^6.5.0
  video_player: ^2.11.1
  razorpay_flutter: ^1.4.5
  open_filex: ^4.5.0
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/medclues_logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/medclues_logo.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/config.env
    - assets/images/
    - assets/images/hospital_building.png
    - assets/images/banner_navigation.png
    - assets/images/specialities/
    - assets/images/specialities/web/
    - assets/icons/
    - assets/animations/
    - assets/videos/
    - assets/videos/opening.mp4
